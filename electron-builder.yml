appId: com.pdmreader.app
productName: PDM Reader
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - package.json

win:
  target:
    - nsis
  icon: resources/icon.png

mac:
  target:
    - dmg
  icon: resources/icon.png
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
